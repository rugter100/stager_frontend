{% extends 'base.html' %}

{% block title %}{{ config.presetup.company_name }} | {{ lang.page_title.home }}{% endblock %}


{% block content %}
<div class="container-fluid py-4">
    <h2 class="text-center mb-4">{{ lang.home.title }}</h2>
    <div class="d-flex flex-wrap justify-content-center gap-4" id="shift-container">
        <!-- Cards -->
    </div>
</div>
<script>
function formatTime(isoString) {
    const date = new Date(isoString);

    return new Intl.DateTimeFormat("nl-NL", {
        hour: "2-digit",
        minute: "2-digit"
    }).format(date);
}

function renderShifts(shifts) {
    const container = document.getElementById("shift-container");
    container.innerHTML = "";

    for (const [key, shift] of Object.entries(shifts)) {
        if (key === "last_updated") continue;

        const pl = shift.colleagues
            .filter(c => c.role === "Productieleider")
            .map(c => `
                <label class="form-label d-block text-center">
                    PL: ${c.crewMemberName}
                </label>
            `)
            .join("");

        const shiftBodies = shift.shifts.map(s => `
            <label class="form-label d-block text-center">
                ${s.role}
                -
                ${formatTime(s.start)}
                -
                ${formatTime(s.end)}
                -
                ${s.length}
            </label>
        `).join("");

        const html = `
    <form action="/shifts/${key}" method="GET">
        <div class="card bg-dark" style="width:320px;">
            <div class="card-header text-center">${key}</div>

            <div class="card-body p-3">
                <div class="mb-3">
                        <h4 class="text-center mb-4">
                            ${shift.shifts[0].eventName}
                        </h4>
                    ${shiftBodies}
                    ${pl}
                </div>
            </div>

            <div class="card-footer">
                <button class="btn btn-primary btn-sm d-block mx-auto">
                    Details
                </button>
            </div>
        </div>
    </form>
`;

        container.insertAdjacentHTML("beforeend", html);
    }
}

async function waitForPartialLoad() {
    const container = document.getElementById("shift-container");

    while (true) {
        const res = await fetch("/api/loading_state");
        const state = await res.json();

        if (state.partial_load) {
            break;
        }

        await new Promise(r => setTimeout(r, 300));
    }
}

async function waitForFullLoadAndUpdate() {
    const container = document.getElementById("shift-container");

    let lastRenderedFull = false;

    while (!lastRenderedFull) {
        const res = await fetch("/api/loading_state");
        const state = await res.json();

        // once partial load is ready → fetch data
        const shiftsRes = await fetch("/api/shifts");
        const shifts = await shiftsRes.json();

        renderShifts(shifts);

        if (state.full_load) {
            lastRenderedFull = true;
            break;
        }

        // small delay to avoid spamming server
        await new Promise(r => setTimeout(r, 1000));
    }
}

async function init() {
    await waitForPartialLoad();   // wait until first data exists
    await waitForFullLoadAndUpdate(); // keep updating until finished
}

document.addEventListener("DOMContentLoaded", init);
</script>
{% endblock %}
