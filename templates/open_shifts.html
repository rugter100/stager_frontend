{% extends 'base.html' %}

{% block title %}{{ config.presetup.company_name }} | {{ lang.page_title.open_shifts }}{% endblock %}


{% block content %}
<div class="container-fluid py-4 px-1">
    <h2 class="text-center mb-4">{{ lang.open_shifts.title }}</h2>
    <div class="d-flex flex-wrap gap-4 justify-content-center" id="shift-container">
        <!-- Cards -->
    </div>
</div>
<script>
function formatTime(isoString) {
    const date = new Date(isoString);

    return new Intl.DateTimeFormat("nl-NL", {
        hour: "2-digit",
        minute: "2-digit"
    }).format(date);
}

function renderShifts(shiftsData) {
    const container = document.getElementById("shift-container");
    container.innerHTML = "";

    for (const [key, shift] of Object.entries(shiftsData)) {
        if (key === "last_updated") continue;

        const open = shift.open_shifts;
        if (!open || !open.shows) continue;
        const isChecked = open.isAvalible ? "checked" : "";

        let showBlocks = "";

        for (const [showName, shiftsList] of Object.entries(open.shows)) {

            const shiftLines = shiftsList.map(s => `
                <tr>
                    <th scope="row" style="width: 35%; overflow: hidden; text-overflow: ellipsis;">
                        ${s.role}
                    </th>
                    <td scope="row" style="width: 35%;">
                        ${formatTime(s.start)}
                        -
                        ${formatTime(s.end)}
                    </td>
                    <td scope="row" style="width: 20%;">
                        ${s.shiftIds.length} open
                    </td>
                </tr>
            `).join("");

            showBlocks += `
                <div class="mx-auto">
                    <div class="bs-component">
                        <table class="table table-hover" style="width: 100%; table-layout: fixed;">
                            <colgroup>
                                <col style="width: 35%;">
                                <col style="width: 35%;">
                                <col style="width: 20%;">
                            </colgroup>

                            <thead>
                                <tr>
                                    <th colspan="3">${showName}</th>
                                </tr>
                            </thead>

                            <tbody>
                                ${shiftLines}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        const formattedDate = new Intl.DateTimeFormat('nl-NL', {
            day: 'numeric',
            month: 'long'
        }).format(new Date(key));

        const html = `
            <form action="/shifts/${key}" method="GET">
                <div class="card bg-dark" style="width: 340px;">

                    <div class="card-header text-center">
                        ${formattedDate}
                    </div>

                    <div class="card-body p-3">

                        <div class="form-check form-switch">
                            <input
                                type="checkbox"
                                class="form-check-input"
                                id="customSwitch_${key}"
                                ${isChecked}
                            >
                            <label class="form-check-label" for="customSwitch_${key}">
                                {{ lang.open_shifts.avalible }}
                            </label>
                        </div>

                        ${showBlocks}
                    </div>

                    <div class="card-footer">
                        <button class="btn btn-primary btn-sm d-block mx-auto">
                            Details
                        </button>
                    </div>

                </div>
            </form>
        `;

        container.insertAdjacentHTML("beforeend", html);
    }
}

async function waitForPartialLoad() {
    const container = document.getElementById("shift-container");

    while (true) {
        const res = await fetch("/api/loading_state");
        const state = await res.json();

        if (state.partial_load) {
            break;
        }

        await new Promise(r => setTimeout(r, 300));
    }
}

async function waitForFullLoadAndUpdate() {
    const container = document.getElementById("shift-container");

    let lastRenderedFull = false;

    while (!lastRenderedFull) {
        const res = await fetch("/api/loading_state");
        const state = await res.json();

        // once partial load is ready → fetch data
        const shiftsRes = await fetch("/api/shifts");
        const shifts = await shiftsRes.json();

        renderShifts(shifts);

        if (state.full_load) {
            lastRenderedFull = true;
            break;
        }

        // small delay to avoid spamming server
        await new Promise(r => setTimeout(r, 1000));
    }
}

async function init() {
    await waitForPartialLoad();   // wait until first data exists
    await waitForFullLoadAndUpdate(); // keep updating until finished
}

document.addEventListener("DOMContentLoaded", init);
</script>
{% endblock %}
