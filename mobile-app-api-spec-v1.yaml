          format: date-time
          example: 2025-02-14T10:15:30+01:00
        end:
          type: string
          format: date-time
          example: 2025-02-14T10:15:30+01:00
        role:
          type: string
          example: Ticket scanner
        eventName:
          type: string
          example: Stager Swift
        teamName:
          type: string
          example: Production
        spaces:
          description: |
            Can be an empty list, espacially for shift created with the old crew schedule. For now, a shift can only
