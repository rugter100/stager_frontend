      allOf:
        - $ref: '#/components/schemas/BaseShift'
        - type: object
          required:
            - shiftId
          properties:
            shiftId:
              type: integer
              format: int64
              example: 1

    OpenShift:
      allOf:
        - $ref: '#/components/schemas/BaseShift'
        - type: object
          required:
            - shiftIds
            - planMode
            - isRequested
          properties:
            shiftIds:
              type: array
              items:
                type: integer
                format: int64
              example: [ 1, 2 ]
            planMode:
              $ref: '#/components/schemas/PlanMode'
            isRequested:
              type: boolean
              description: |
                `true` if `planMode` is `REQUEST` and the crew member has requested this shift.

