          type: string
          example: "John Doe"
        role:
          description: The role of this shift.
          type: string
          example: "Cleaner"
        profilePicture:
          description: The URL to the profile picture of the crew member
          type: string
          example: "https://domain-to-picture/the-picture.png"
        start:
          description: The start of the shift.
          type: string
          format: date-time
        end:
          description: The end of the shift.
          type: string
          format: date-time

