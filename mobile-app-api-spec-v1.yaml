      properties:
        name:
          type: string
          example: "T-shirt size"
        value:
          type: string
          example: "M"

    CrewMemberContract:
      type: object
      properties:
        startDate:
          type: string
          format: date
          example: 2025-02-14
        endDate:
          type: string
          format: date
          example: 2025-02-14
        contractType:
          type: string
          enum: [
            HOURS_PER_WEEK,
            HOURS_PER_MONTH,
            SHIFTS_PER_WEEK,
            SHIFTS_PER_MONTH,
            SHIFTS_PER_YEAR
          ]
        hoursOrShiftsPerPeriod:
          type: integer
          format: int32
        iban:
          type: string
        cocNumber:
          type: string
        vatNumber:
          type: string

