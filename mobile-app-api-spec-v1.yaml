          type: string
          example: "Rotterdam"
        country:
          type: string
          example: "Netherlands"
        birthDate:
          type: string
          format: date
          example: 2025-02-14
        preferences:
          type: array
          description: All preferences that the crew member has filled in
          items:
            $ref: '#/components/schemas/CrewMemberPreference'
        contract:
          description: If the contract is not `null`, there's at least one field that has been filled in.
          $ref: '#/components/schemas/CrewMemberContract'

