      type: object
      required:
        - myShiftsByDate
        - openShiftsByDate
      properties:
        myShiftsByDate:
          description: The shifts assigned to the crew member, grouped by date.
          type: array
          items:
            $ref: '#/components/schemas/MyShiftsByDate'
        openShiftsByDate:
          description: |
            The shifts that are claimable/requestable by the crew member, grouped by date and event. For each date is
            included whether the crew member is available for that day.
          type: array
          items:
            $ref: '#/components/schemas/OpenShiftsByDate'

    OpenShifts:
      type: object
      properties:
        openShiftsByDate:
          type: array
          items:
            $ref: '#/components/schemas/OpenShiftsByDate'

    MyShifts:
      type: object
      properties:
        myShiftsByDate:
          type: array
          items:
            $ref: '#/components/schemas/MyShiftsGroupedByDate'

    MyShiftsByDate:
      type: object
      description: This is the deprecated version
      properties:
        date:
          type: string
          format: date
          example: 2025-02-14
        myShifts:
          type: array
          items:
            $ref: '#/components/schemas/MyShift'

    MyShiftsGroupedByDate:
      type: object
      properties:
        date:
          type: string
          format: date
          example: 2025-02-14
        groups:
          description: The shifts that are grouped by event, if any.
          type: array
          items:
            $ref: '#/components/schemas/MyShiftGroup'

    OpenShiftsByDate:
      type: object
      properties:
        date:
          type: string
          format: date
          example: 2025-02-14
        isAvailable:
          type: boolean
          example: false
          description: |
            Whether the crew member has set their availability for this date. If `true`, the shifts in this date are
            claimable or requestable (unless already requested).
        groups:
          description: The shifts that are grouped by event, if any.
          type: array
          items:
            $ref: '#/components/schemas/ShiftGroup'

    ColleaguesShiftsByDate:
      type: object
      required:
        - groupsByEvent
      properties:
        currentDate:
          description: |
            The current date of the colleague's shifts. Is `null` when the given `date` is `null` and there are no
            shifts found in the future for this crew member.
          type: string
          format: date
        previousDate:
          description: |
            The previous date that this crew member has a shift on. `null` if there are no shifts before `currentDate`.
          type: string
          format: date
        nextDate:
          description: |
            The next date that this crew member has a shift on. `null` if there are no shifts after the `currentDate`.
          type: string
          format: date
        groupsByEvent:
          description: The shifts, grouped by events.
          type: array
          items:
            $ref: '#/components/schemas/ColleaguesShiftsByEvent'

