      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestResponse'

    Forbidden:
      description: The user or scan device does not have the correct permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenResponse'

    CrewMemberForbidden:
      description: The logged in user is not a crew member
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenResponse'

    NotFound:
      description: Responds with a 404 status code when a required object could not be found with the given parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundResponse'

    GatewayTimeout:
      description: The server temporarily is unable to upload the file.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayTimeoutResponse'

    RefundImpossibleOrBadRequest:
      description: Either a regular BadRequest response or the reason why the ticket could not be refunded.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/BadRequestResponse'
              - $ref: '#/components/schemas/RefundImpossibleReason'

    TicketScanError:
      description: Scanning the barcode not allowed. The reason why is specified
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TicketScanErrorResponse'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

