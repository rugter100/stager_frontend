      type: object
      required:
        - shifts
      properties:
        eventName:
          type: string
          example: "Stager Swift"
        shifts:
          type: array
          items:
            $ref: '#/components/schemas/OpenShift'

    ColleaguesShiftsByEvent:
      type: object
      required:
        - shiftsByTeam
      properties:
        eventName:
          type: string
        shiftsByTeam:
          description: The shifts, grouped by its team.
