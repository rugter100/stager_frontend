        date:
          type: string
          format: date
          example: 2025-02-14
        type:
          description: Whether to set the availability to `available` or `unavailable` for this date.
          type: string
          enum: [ "AVAILABLE", "UNAVAILABLE" ]

    UpdateAvailabilityRequestV2:
      type: object
      required:
        - start
        - end
        - type
      properties:
        id:
          type: integer
          format: int64
          description: Not required. If provided, it will update the existing (un)availability, else create a new one.
        start:
          type: string
          format: date-time
          example: 2025-02-14 20:00:00
        end:
          type: string
          format: date-time
          example: 2025-02-14 20:00:00
        type:
          description: Whether to set the availability to `available` or `unavailable` for this date.
          type: string
          enum: [ "AVAILABLE", "UNAVAILABLE" ]

    CrewMemberOverviewItem:
      type: object
      required:
        - id
        - start
        - end
        - type
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        type:
          type: string
          enum: [ "SCHEDULED_SHIFT", "REQUESTED_SHIFT", "AVAILABILITY", "UNAVAILABILITY" ]

    ShiftIds:
      type: object
      required:
        - shiftIds
      properties:
        shiftIds:
          description: |
            The IDs of the shifts that are in the same group. These are already given as a list, that can be used here.
          type: array
          items:
            type: integer
            format: int64

    UploadProfilePictureResponse:
      type: object
      properties:
